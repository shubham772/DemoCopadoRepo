        </div>

                {tech}
            </div>

                                        </div>
                                    </th>
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="CTC">Solicitante</div>
                                    </th>
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="Cliente">Cliente</div>
                                    </th>
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="Cidade">Cidade</div>
                                    </th>
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="Moeda">Moeda</div>
                                    </th>
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="Valor Total">Valor do Pedido</div>
                                    </th>
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="Tipo de Pedido">Tipo de Pedido</div>
                                    </th>
                                    <!--GRZ(Nikhil Verma) : APPS-1394 PO & Delivery Date :28-07-2022-->
                                    <th class="slds-p-left_x-small table-head-css" scope="col">
                                        <div class="slds-truncate" title="Pedido">Pedido</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="table-body">
                                <template for:each={salesOrderList} for:item="Sorder">
                                    <tr key={Sorder.Id} class="slds-border_bottom bgcolormobile shadoweffect">
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view">
                                            <a data-value={Sorder.Id} onclick={handleOrderDetail} href={detailPageLink}
                                                target="_blank"
                                                class="order-link textoverflowcls">{Sorder.SFDCOrderNumber}</a>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.InvoiceStatus}</div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.CreatedDate}</div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.SalesRepName}</div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.SoldToPartyName}</div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.City}</div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.CurrencyBrazil}</div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">

                                                <lightning-formatted-number value={Sorder.Amount}

                                                </lightning-formatted-number>
                                            </div>
                                        </td>
                                        <td class="slds-p-left_x-small table-body-css br-mobile-view" scope="col">
                                            <div class="textoverflowcls">{Sorder.OrderType}</div>
                                        </td>
                                        <td style="cursor:pointer;"

                                                        </lightning-icon>

                <div class="mobile">

                                        Venda

                                    <div class="slds-size_1-of-1">
                                        <a data-value={Sorder.Id} onclick={handleOrderDetail} href={detailPageLink}

                                            {Sorder.SFDCOrderNumber}
                                        </a>
                                    </div>

                                    <div class="slds-size_1-of-2"><strong>Status:</strong> {Sorder.InvoiceStatus}</div>
                                    <div class="slds-size_1-of-2"><strong>Data:</strong> {Sorder.CreatedDate}</div>
                                    <div class="slds-size_1-of-2"><strong>CTC:</strong> {Sorder.SalesRepName}</div>

                                    <div class="slds-size_1-of-2"><strong>Cidade:</strong> {Sorder.City}</div>
                                    <div class="slds-size_1-of-2"><strong>Moeda:</strong> {Sorder.CurrencyBrazil}</div>
                                    <div class="slds-size_1-of-2"><strong>Valor: </strong>
                                        <lightning-formatted-number value={Sorder.Amount} minimum-fraction-digits="0">
                                        </lightning-formatted-number>
                                    </div>
                                    <div class="slds-size_1-of-2"><strong>Tipo:</strong> {Sorder.OrderType}</div>
                                </div>

                                <footer>
                                    <div class="slds-size_1-of-1">

   <lightning-icon icon-name="doctype:pdf" size="small" alternative-text="Download PDF" class="slds-m-right_xx-small"></lightning-icon>
Baixar PDF
</button>
                                    </div>
                                </footer>
                            </div>
                        </article>
                    </template>
                </div>
            </template>
            <template if:false={isSalesOrdersAvailable}>

            </template>

            </div>
        </template>

                                                <template if:false={option.checked}>
                                                    <span class="slds-m-right_x-small" style="display: inline-block; width: 16px; height: 16px;"></span>
                                                </template>
                                                {option.label}

                                </div>
        </template>
    </div>
    </div>
    <div class="slds-col">
        <div class="dropdown" onmouseleave={handleOutsideClick}>
            <div class={computedClass} data-key="currency" onclick={toggleDropdown} onmouseout={closeDropdown}>
                {label.Currency} ▼

                                                <template if:false={option.checked}>
                                                    <span class="slds-m-right_x-small" style="display: inline-block; width: 16px; height: 16px;"></span>
                        </template>
                        {option.label}

            </ul>
        </div>
</template>
</div>
</div>

                                                <template if:false={option.checked}>

<template if:true={isShowModal}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
        aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- modal header start -->
            <header class="slds-modal__header header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={hideModalBox}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">
                    {labelsJson.SO_Selection_Modal_Header}
                </h2>
            </header>

            <!-- modal body start -->
            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                <div class="slds-grid slds-wrap slds-gutters slds-m-around_xx-small ">
                    <div
                        class="slds-col slds-size_1-of-1 slds-small-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1">
                        <template if:true={showKeyAccount}>
                            <div class="slds-grid slds-wrap">
                                <div
                                    class="slds-col slds-size_4-of-12 slds-text-align_left slds-p-around_xx-small boxlabel">
                                    <label class="radio-label"><b>{label.KeyAccountText} :</b> </label>
                                </div>
                                <div
                                    class="slds-col slds-size_6-of-12 slds-text-align_left slds-p-around_xx-small boxvalue">
                                    <lightning-radio-group name="Key Account Text" class="radio-combo-inline"
                                        data-id="keyAccount" label={label.KeyAccountText} options={accountKeyyOptions}
                                        type="radio" value={defaultValue} variant="label-hidden"
                                        onchange={handleKeyAccountSelection}>
                                    </lightning-radio-group>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div
                        class="slds-col slds-size_1-of-1 slds-small-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1">
                        <template if:true={showSeller}>
                            <div class="slds-grid slds-wrap">
                                <div
                                    class="look-up slds-col slds-size_4-of-12 slds-text-align_left slds-p-top_small boxlabel">
                                    <label class=""><b><span class="required">*</span>{label.Seller} : </b></label>
                                </div>
                                <div
                                    class="slds-col slds-size_6-of-12 slds-text-align_left slds-p-around_xx-small boxvalue">
                                    <c-grz_sales-order-reusable-modal class="seller" data-id="sellerOptions"
                                        multiselect={isMultiselect} inputlabel='' placeholder={label.Grz_SelectSeller}
                                        searchlabel={label.Grz_SelectSeller} modalheader={label.Grz_SelectSeller}
                                        maindata={sellerOptionsList} columns={sellerColumns}
                                        onmycustomevent={handleSellerChange} islookuprequired=false>
                                    </c-grz_sales-order-reusable-modal>

                                </template>
                                <template if:true={isUpdateCurrency}>
                                    <lightning-combobox name="Currency" data-id="currency"
                                        options={currencyDropDownList} value={selectedCurrency} variant="label-hidden"
                                        onchange={handleCurrencyChange}>
                                    </lightning-combobox>
                                </template>
                            </div>
                        </div>

                        <div class="slds-border_top slds-p-top_small">
                            <div class="slds-grid slds-wrap">
                                <div class="slds-size_1-of-3 slds-text-title_caps">
                                    TOTAL
                                </div>
                                <div class="slds-size_2-of-3 slds-text-align_right slds-text-color_success">
                                    {newSalesOrder.CurrencyIsoCode} <lightning-formatted-number value={totalPrice}
                                        format-style="decimal" minimum-fraction-digits="2" maximum-fraction-digits="2">
                                    </lightning-formatted-number>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="slds-m-top_medium">
                        <button class="slds-button slds-button_success slds-button_stretch" onclick={completeOrder} disabled={completeButtonDisabled}>{labelsJson2.Comp_Order}</button>
                    </div>

                    <div class="slds-m-top_small">
                        <button class="slds-button slds-button_brand slds-button_stretch" style="background: #FFC107; border: none; color:black;" onclick={backToList}>{labelsJson2.Buy_More}</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
<template if:true={isShowModalOnPayTMChange}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
        aria-describedby="modal-content-id-1" class="slds-modal slds-modal_small slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- modal header start -->
            <header class="slds-modal__header">
                <h2 id="modal-heading-0112" class="slds-text-heading_medium slds-hyphenate">
                    {labelsJson2.Select_Maturity}</h2>
            </header>

            <!-- modal body start -->
            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-121">
                <div class="">
                    <lightning-input type="date" data-id="maturityDate" value={newSalesOrder.Maturity_Date__c}
                        onchange={handleMaturityDateChange} onblur={restrictMaturityDate} label={label.Maturity_Date}
                        required>
                    </lightning-input>
                </div>
            </div>
            <footer class="slds-modal__footer">
                <div class="button-container">
                    <button class="custom-btn slds-button slds-button_neutral" label={labelsJson.Cancel} onclick={cancelaturityDateModal}>{labelsJson.Cancel}</button>
                    <button class="custom-btn slds-button slds-button_brand" label="Ok" onclick={saveMaturityDate}>Ok</button>
                </div>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
<template if:true={showEditLineItemModal}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-011" aria-modal="true"
        aria-describedby="modal-content-id-11" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- modal header start -->
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={hideEditLineItemModalBox}>
                <lightning-icon icon-name="utility:close"
                   alternative-text="close"
                   variant="inverse"
                   size="small" ></lightning-icon>
                <span class="slds-assistive-text">Close</span>
             </button>
                <h2 id="modal-heading-0111" class="slds-text-heading_medium slds-hyphenate">Editar item de linha do
                    pedido de venda</h2>
            </header>

            <!-- modal body start -->
            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1111">

            </div>

            <!-- modal footer start-->
            <footer class="slds-modal__footer">
                <div
                    class="slds-x-small-size_12-of-12 slds-small-size_12-of-12 slds-medium-size_12-of-12 slds-large-size_12-of-12">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-small-size_1-of-2">
                            <button class="slds-button slds-button_success slds-button_stretch saveButton" onclick={handleSaveLineItemsData}>{label.Save}</button>
                        </div>
                        <div class="slds-col slds-small-size_1-of-2">
                            <button class="slds-button slds-button_destructive slds-button_stretch" onclick={handleRemove}>Excluir</button>
                        </div>
                    </div>
                </div>
            </footer>

        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
<template if:true={showTermsConditions}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- Modal Header -->
            <header class="slds-modal__header slds-modal__header_empty">
                <h2 class="slds-text-heading_medium slds-p-around_medium">{termsLabels.TermsHeader}</h2>
            </header>

            <!-- Modal Body -->
            <div class="slds-modal__content slds-p-around_medium">
                <div class="slds-scrollable_y no-scrollbar" style="max-height: 250px;">
                    <div lwc:dom="manual" class="terms"></div>
                </div>

                <div class="slds-grid slds-wrap slds-m-top_medium">
                    <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                        <lightning-input type="checkbox" label={termsLabels.Agree} checked={isTermsChecked}
                            onchange={handleTermsChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1">
                        <lightning-input type="checkbox" label={termsLabels.AgreeNoReturn} checked={isAgreedOnNoReturn}
                            onchange={handleAgreedOnNoReturn}>
                        </lightning-input>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <footer class="slds-modal__footer slds-grid slds-grid_align-end">
                <lightning-button variant="brand" label="Confirmar a Compra" onclick={handleSaveOrder}
                    disabled={isSubmitDisabled}>
                </lightning-button>
                <lightning-button label='Cancelar' onclick={handleCnclOrder}>
                </lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
</div>

</template>
